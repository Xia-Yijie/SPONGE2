[workspace]
name = "SPONGE"
version = "2.0.0-alpha"
description = "Simulation Package Toward Next GEneration of molecular modelling"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-arm64"]
preview = ["pixi-build"]
conda-pypi-map = { conda-forge = "scripts/conda-pypi-map.json" }

[environments]
cpu = ["cpu"]
cuda12 = ["cuda", "cuda12"]
cuda13 = ["cuda", "cuda13"]
dev-cpu = ["dev", "cpu"]
dev-cuda12 = ["dev", "cuda", "cuda12"]
dev-cuda13 = ["dev", "cuda", "cuda13"]
ref-gen = ["ref-gen"]

[feature.cuda.target.linux-64.dependencies]
cmake = ">=3.24"
ninja = "*"
libcufft-dev = "*"
libcublas-dev = "*"
libcusolver-dev = "*"
libcurand-dev = "*"
cuda-nvrtc-dev = "*"
gcc_linux-64 = "11.*"
gxx_linux-64 = "11.*"
tomlplusplus = "*"

[feature.cuda.target.win-64.dependencies]
cmake = ">=3.24"
ninja = "*"
libcufft-dev = "*"
libcublas-dev = "*"
libcusolver-dev = "*"
libcurand-dev = "*"
cuda-nvrtc-dev = "*"
vs2022_win-64 = "*"
tomlplusplus = "*"

[feature.cuda12.target.linux-64.dependencies]
cuda-nvcc = "12.0.*"

[feature.cuda12.target.win-64.dependencies]
cuda-nvcc = "12.0.*"

[feature.cuda13.target.linux-64.dependencies]
cuda-nvcc = "13.0.*"

[feature.cuda13.target.win-64.dependencies]
cuda-nvcc = "13.0.*"

[feature.cpu.target.linux-64.dependencies]
cmake = ">=3.24"
ninja = "*"
mkl-devel = "*"
gcc_linux-64 = "11.*"
gxx_linux-64 = "11.*"
tomlplusplus = "*"

[feature.cpu.target.win-64.dependencies]
cmake = ">=3.24"
ninja = "*"
mkl-devel = "*"
vs2022_win-64 = "*"
tomlplusplus = "*"

[feature.dev.target.linux-64.dependencies]
git = "*"
clang-format = "*"
cmake-format = "*"
ruff = "*"
python = ">=3.9"
zstandard = "*"
numpy = "*"
pytest = "*"
patchelf = "*"

[feature.dev.target.win-64.dependencies]
git = "*"
clang-format = "*"
cmake-format = "*"
ruff = "*"
python = ">=3.9"
zstandard = "*"
numpy = "*"
pytest = "*"

[feature.dev.target.linux-64.pypi-dependencies]
xponge = "*"
ase = "*"

[feature.dev.target.win-64.pypi-dependencies]
xponge = "*"
ase = "*"

[feature.ref-gen.target.linux-64.dependencies]
python = ">=3.9"
numpy = "*"
ambertools = "*"
gromacs = "*"
lammps = "*"

[feature.ref-gen.target.linux-64.pypi-dependencies]
pyscf = ">=2.12.1,<3"
xponge = "*"
ase = "*"

[target.linux-64.tasks]
configure = "cmake -S . -B build -G Ninja"
compile = "cmake --build build --config Release --target install"

[target.win-64.tasks]
configure = "cmake -S . -B build -G Ninja"
compile = "cmake --build build --config Release --target install"
install-msvc = "powershell -ExecutionPolicy Bypass -File scripts/install-msvc.ps1"

[feature.cpu.target.linux-64.tasks]
configure = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='none' -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\" -DCMAKE_CXX_COMPILER=\"$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-c++\""
compile = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install"

[feature.cpu.target.win-64.tasks]
configure = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='none' -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\""
compile = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install"

[feature.cuda.target.linux-64.tasks]
configure = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='cuda' -DCUDA_ARCH='all-major' -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\" -DCMAKE_CXX_COMPILER=\"$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-c++\" -DCMAKE_CUDA_HOST_COMPILER=\"$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-g++\""
compile = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install"

[feature.cuda.target.win-64.tasks]
configure = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='cuda' -DCUDA_ARCH='all-major' -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\""
compile = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install"

[feature.dev.target.linux-64.tasks]
comp-lammps = "pytest benchmarks/comparison/tests/lammps/tests/comp_*.py -s --tb=short"
comp-pyscf = "python -m pytest benchmarks/comparison/tests/pyscf/tests/comp_*.py -s --tb=short"
comp-amber = "python -m pytest benchmarks/comparison/tests/amber/tests/comp_*.py -s --tb=short"
comp-gromacs = "python -m pytest benchmarks/comparison/tests/gromacs/tests/comp_*.py -s --tb=short"
vali-thermostat = "pytest benchmarks/validation/thermostat/tests -s --tb=short"
vali-barostat = "pytest benchmarks/validation/barostat/tests -s --tb=short"
vali-misc = "pytest benchmarks/validation/misc/tests -s --tb=short"
perf-sits = "pytest benchmarks/performance/sits/tests -s --tb=short"
format = "GITHOOK_MODIFY=1 GITHOOK_AUTO_ADD=0 GITHOOK_ALL=1 GITHOOK_FILES= scripts/pre-commit"
format-check = "GITHOOK_MODIFY=0 GITHOOK_AUTO_ADD=0 GITHOOK_ALL=1 GITHOOK_FILES= scripts/pre-commit"
package = "python conda/build_package.py --env $PIXI_ENVIRONMENT_NAME --output-dir conda/outputs"

[feature.dev.target.win-64.tasks]
comp-lammps = "pytest benchmarks/comparison/tests/lammps/tests/comp_*.py -s --tb=short"
comp-pyscf = "python -m pytest benchmarks/comparison/tests/pyscf/tests/comp_*.py -s --tb=short"
comp-amber = "python -m pytest benchmarks/comparison/tests/amber/tests/comp_*.py -s --tb=short"
comp-gromacs = "python -m pytest benchmarks/comparison/tests/gromacs/tests/comp_*.py -s --tb=short"
vali-thermostat = "pytest benchmarks/validation/thermostat/tests -s --tb=short"
vali-barostat = "pytest benchmarks/validation/barostat/tests -s --tb=short"
vali-misc = "pytest benchmarks/validation/misc/tests -s --tb=short"
perf-sits = "pytest benchmarks/performance/sits/tests -s --tb=short"
format = "GITHOOK_MODIFY=1 GITHOOK_AUTO_ADD=0 GITHOOK_ALL=1 GITHOOK_FILES= python -X utf8 scripts/pre-commit"
format-check = "GITHOOK_MODIFY=0 GITHOOK_AUTO_ADD=0 GITHOOK_ALL=1 GITHOOK_FILES= python -X utf8 scripts/pre-commit"
package = "python conda/build_package.py --env $PIXI_ENVIRONMENT_NAME --output-dir conda/outputs"

[feature.ref-gen.target.linux-64.tasks]
ref-gen-pyscf = "python benchmarks/comparison/reference/pyscf/generate.py"
ref-check-pyscf = "python benchmarks/comparison/reference/pyscf/generate.py --check"
ref-gen-amber = "python benchmarks/comparison/reference/amber/generate.py"
ref-check-amber = "python benchmarks/comparison/reference/amber/generate.py --check"
ref-gen-gromacs = "python benchmarks/comparison/reference/gromacs/generate.py"
ref-check-gromacs = "python benchmarks/comparison/reference/gromacs/generate.py --check"
ref-gen-lammps = "python benchmarks/comparison/reference/lammps/generate.py"
ref-check-lammps = "python benchmarks/comparison/reference/lammps/generate.py --check"

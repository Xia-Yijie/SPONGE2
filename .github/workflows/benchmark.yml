name: Benchmark

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

jobs:
  benchmark-cpu:
    name: SPONGE-CPU Benchmark (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: cpu
            env_name: dev-cpu
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu
            env_name: dev-cpu
            target: linux-64
            runner: ubuntu-22.04
          - feature: cpu
            env_name: dev-cpu
            target: win-64
            runner: windows-2022
          - feature: cpu
            env_name: dev-cpu
            target: osx-arm64
            runner: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Install dev-cpu environment
        run: pixi install -e ${{ matrix.env_name }}

      - name: Configure SPONGE-CPU
        run: pixi run -e ${{ matrix.env_name }} configure

      - name: Compile SPONGE-CPU
        run: pixi run -e ${{ matrix.env_name }} compile

      - name: Benchmark comparison/lammps
        run: pixi run -e ${{ matrix.env_name }} comp-lammps

      - name: Benchmark comparison/pyscf
        run: pixi run -e ${{ matrix.env_name }} comp-pyscf

      - name: Benchmark comparison/amber
        run: pixi run -e ${{ matrix.env_name }} comp-amber

      - name: Benchmark comparison/gromacs
        run: pixi run -e ${{ matrix.env_name }} comp-gromacs

      - name: Benchmark validation/cv
        run: pixi run -e ${{ matrix.env_name }} vali-cv

      - name: Benchmark validation/thermostat
        run: pixi run -e ${{ matrix.env_name }} vali-thermostat

      - name: Benchmark validation/misc (except prips and minimization)
        run: >-
          pixi run -e ${{ matrix.env_name }} vali-misc -k
          "not prips and not minimization"

  benchmark-cpu-prips:
    name: PRIPS-CPU Benchmark (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: cpu
            env_name: dev-cpu
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu
            env_name: dev-cpu
            target: linux-64
            runner: ubuntu-22.04
          - feature: cpu
            env_name: dev-cpu
            target: win-64
            runner: windows-2022
          - feature: cpu
            env_name: dev-cpu
            target: osx-arm64
            runner: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Install dev-cpu environment
        run: pixi install -e ${{ matrix.env_name }}

      - name: Configure SPONGE-CPU
        run: pixi run -e ${{ matrix.env_name }} configure

      - name: Compile SPONGE-CPU
        run: pixi run -e ${{ matrix.env_name }} compile

      - name: Install PRIPS
        shell: bash
        run: |
          pixi run -e ${{ matrix.env_name }} python -m pip install plugins/prips

      - name: Benchmark validation/prips (numpy)
        run: pixi run -e ${{ matrix.env_name }} vali-misc -k prips
        env:
          PRIPS_TEST_BACKEND: numpy
          KMP_DUPLICATE_LIB_OK: ${{ matrix.target == 'win-64' && 'TRUE' || '' }}

      - name: Install CPU backends for PRIPS
        shell: bash
        run: |
          pixi run -e ${{ matrix.env_name }} python -m pip install "jax[cpu]" torch

      - name: Benchmark validation/prips (jax)
        run: pixi run -e ${{ matrix.env_name }} vali-misc -k prips
        env:
          PRIPS_TEST_BACKEND: jax
          KMP_DUPLICATE_LIB_OK: ${{ matrix.target == 'win-64' && 'TRUE' || '' }}

      - name: Benchmark validation/prips (pytorch)
        run: pixi run -e ${{ matrix.env_name }} vali-misc -k prips
        env:
          PRIPS_TEST_BACKEND: pytorch
          KMP_DUPLICATE_LIB_OK: ${{ matrix.target == 'win-64' && 'TRUE' || '' }}

  benchmark-cpu-barostat:
    name: benchmark-cpu-barostat (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: cpu
            env_name: dev-cpu
            target: linux-aarch64
            runner: ubuntu-24.04-arm
            shard: all
            label: linux-aarch64
          - feature: cpu
            env_name: dev-cpu
            target: linux-64
            runner: ubuntu-22.04
            shard: all
            label: linux-64
          - feature: cpu
            env_name: dev-cpu
            target: win-64
            runner: windows-2022
            shard: andersen
            label: win-64, andersen
          - feature: cpu
            env_name: dev-cpu
            target: win-64
            runner: windows-2022
            shard: bussi
            label: win-64, bussi
          - feature: cpu
            env_name: dev-cpu
            target: win-64
            runner: windows-2022
            shard: berendsen
            label: win-64, berendsen
          - feature: cpu
            env_name: dev-cpu
            target: osx-arm64
            runner: macos-14
            shard: all
            label: osx-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Install dev-cpu environment
        run: pixi install -e ${{ matrix.env_name }}

      - name: Configure SPONGE-CPU
        run: pixi run -e ${{ matrix.env_name }} configure

      - name: Compile SPONGE-CPU
        run: pixi run -e ${{ matrix.env_name }} compile

      - name: Benchmark validation/barostat (full)
        if: matrix.shard == 'all'
        run: pixi run -e ${{ matrix.env_name }} vali-barostat

      - name: Benchmark validation/barostat (regulate shard)
        if: matrix.shard != 'all'
        run: >-
          pixi run -e ${{ matrix.env_name }} python -X utf8 -m pytest
          benchmarks/validation/barostat/tests/test_regulate.py -s --tb=short
          -k ${{ matrix.shard }}_barostat

      - name: Benchmark validation/barostat (schedule inputs once)
        if: matrix.shard == 'andersen'
        run: >-
          pixi run -e ${{ matrix.env_name }} python -X utf8 -m pytest
          benchmarks/validation/barostat/tests/test_schedule_inputs.py -s
          --tb=short

  benchmark-cpu-mpi-np2:
    name: benchmark-cpu-mpi-np2 (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-64
            runner: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Install dev-cpu-mpi environment
        run: pixi install -e ${{ matrix.env_name }}

      - name: Format check
        run: pixi run -e ${{ matrix.env_name }} format-check

      - name: Configure SPONGE-CPU-MPI
        run: pixi run -e ${{ matrix.env_name }} configure

      - name: Compile SPONGE-CPU-MPI
        run: pixi run -e ${{ matrix.env_name }} compile

      - name: Benchmark comparison/gromacs (MPI np=2)
        run: pixi run -e ${{ matrix.env_name }} comp-gromacs --mpi 2

      - name: Benchmark comparison/amber (MPI np=2)
        run: pixi run -e ${{ matrix.env_name }} comp-amber --mpi 2

      - name: Benchmark validation/cv (MPI np=2)
        run: pixi run -e ${{ matrix.env_name }} vali-cv --mpi 2

      - name: Benchmark validation/thermostat (MPI np=2)
        run: pixi run -e ${{ matrix.env_name }} vali-thermostat --mpi 2

      - name: Benchmark validation/misc (walls and softcore, MPI np=2)
        run: >-
          pixi run -e ${{ matrix.env_name }} vali-misc --mpi 2 -k
          "walls or softcore"

  benchmark-cpu-mpi-np2-barostat:
    name: benchmark-cpu-mpi-np2-barostat (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-aarch64
            runner: ubuntu-24.04-arm
            shard: all
            label: linux-aarch64
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-64
            runner: ubuntu-22.04
            shard: andersen
            label: linux-64, andersen
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-64
            runner: ubuntu-22.04
            shard: bussi
            label: linux-64, bussi
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-64
            runner: ubuntu-22.04
            shard: berendsen
            label: linux-64, berendsen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Install dev-cpu-mpi environment
        run: pixi install -e ${{ matrix.env_name }}

      - name: Format check
        run: pixi run -e ${{ matrix.env_name }} format-check

      - name: Configure SPONGE-CPU-MPI
        run: pixi run -e ${{ matrix.env_name }} configure

      - name: Compile SPONGE-CPU-MPI
        run: pixi run -e ${{ matrix.env_name }} compile

      - name: Benchmark validation/barostat (MPI np=2, full)
        if: matrix.shard == 'all'
        run: pixi run -e ${{ matrix.env_name }} vali-barostat --mpi 2

      - name: Benchmark validation/barostat (MPI np=2, regulate shard)
        if: matrix.shard != 'all'
        run: >-
          pixi run -e ${{ matrix.env_name }} python -X utf8 -m pytest
          benchmarks/validation/barostat/tests/test_regulate.py -s --tb=short
          --mpi 2 -k ${{ matrix.shard }}_barostat

      - name: Benchmark validation/barostat (MPI np=2, schedule inputs once)
        if: matrix.shard == 'andersen'
        run: >-
          pixi run -e ${{ matrix.env_name }} python -X utf8 -m pytest
          benchmarks/validation/barostat/tests/test_schedule_inputs.py -s
          --tb=short --mpi 2

  benchmark-cpu-mpi-np3:
    name: benchmark-cpu-mpi-np3 (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-64
            runner: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Install dev-cpu-mpi environment
        run: pixi install -e ${{ matrix.env_name }}

      - name: Format check
        run: pixi run -e ${{ matrix.env_name }} format-check

      - name: Configure SPONGE-CPU-MPI
        run: pixi run -e ${{ matrix.env_name }} configure

      - name: Compile SPONGE-CPU-MPI
        run: pixi run -e ${{ matrix.env_name }} compile

      - name: Benchmark comparison/gromacs (MPI np=3)
        run: pixi run -e ${{ matrix.env_name }} comp-gromacs --mpi 3

      - name: Benchmark comparison/amber (MPI np=3)
        run: pixi run -e ${{ matrix.env_name }} comp-amber --mpi 3

      - name: Benchmark validation/cv (MPI np=3)
        run: pixi run -e ${{ matrix.env_name }} vali-cv --mpi 3

      - name: Benchmark validation/misc (walls and softcore, MPI np=3)
        run: >-
          pixi run -e ${{ matrix.env_name }} vali-misc --mpi 3 -k
          "walls or softcore"
